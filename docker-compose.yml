# ══════════════════════════════════════════════════════════════════════════════
# Document Generator — Docker Compose
#
# Usage:
#   1. Copy Data_Ingestion/.env.example  →  Data_Ingestion/.env
#   2. Fill in your API keys in .env
#   3. (Gemini) Place GCP service account key at  Data_Ingestion/key.json
#      and uncomment the key.json volume mount below.
#   4. docker-compose up -d
#   5. API available at http://localhost:7071/api
#
# Useful commands:
#   docker-compose up -d          start in background
#   docker-compose logs -f        stream logs
#   docker-compose down           stop and remove containers
#   docker-compose down -v        stop + wipe data volume (fresh start)
#   docker-compose build          rebuild image after code changes
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  document-generator-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: document-generator-api:latest
    container_name: document-generator-api
    ports:
      - "7071:7071"      # API available at  http://localhost:7071/api

    # ── Environment variables ─────────────────────────────────────────────────
    # Reads from Data_Ingestion/.env  (copy from .env.example and fill in keys)
    env_file:
      - Data_Ingestion/.env

    # Runtime overrides (these win over .env values)
    environment:
      - LOCAL_MODE=true          # store files locally, no Azure Blob needed
      - LOCAL_DB=true            # SQLite DB at local_storage/intellidraft.db
      - ASYNC_GENERATION=true    # background generation (non-blocking)

    # ── Persistent storage ────────────────────────────────────────────────────
    # SQLite DB + parsed documents survive container restarts
    volumes:
      - document-generator-data:/app/Data_Ingestion/local_storage
      # ── Gemini / Vertex AI key (optional) ───────────────────────────────────
      # To use Gemini as the primary LLM:
      #   1. Place your GCP service account JSON at  Data_Ingestion/key.json
      #   2. Uncomment the line below
      #   key.json is in .dockerignore — it is NEVER baked into the image.
      # - ./Data_Ingestion/key.json:/app/Data_Ingestion/key.json:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7071/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

# ── Named volume — data persists across restarts ──────────────────────────────
volumes:
  document-generator-data:
    name: document-generator-data
