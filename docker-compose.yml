# IntelliDraft — local / self-hosted Docker deployment (FastAPI, single service).
#
#   docker compose up -d --build
#   open http://localhost:7071/
#
# The Celery worker + Redis services were removed with the async preview stack —
# document preview is now synchronous (LibreOffice in-process, markdown2 fallback)
# and section generation is wave-parallel inside the app process.

services:
  intellidraft:
    build:
      context: .
      dockerfile: Dockerfile
    image: intellidraft:latest
    container_name: intellidraft
    ports:
      - "7071:7071"
    env_file:
      - Data_Ingestion/.env          # LLM creds, DATABRICKS_MODE, flags, etc.
    environment:
      - PORT=7071
      - GENERATION_CONCURRENCY=4      # parallel section generation
      - THREADPOOL_TOKENS=80          # sync-endpoint concurrency
      # - CORS_ALLOW_ORIGINS=https://your-host   # restrict origins in prod
    volumes:
      # Persist the local SQLite DB + parsed documents across restarts
      # (ignored when DATABRICKS_MODE=true — data then lives in Databricks).
      - intellidraft_storage:/app/Data_Ingestion/local_storage
      # Mount the GCP service-account key for Gemini (read-only)
      - ./Data_Ingestion/key.json:/app/Data_Ingestion/key.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7071/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

volumes:
  intellidraft_storage:
